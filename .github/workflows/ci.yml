name: CI

on:
  push:
    branches: [ main, 'feat/*' ]
  pull_request:
    branches: [ main, 'feat/*' ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv sync

      - name: Install pytest & flake8
        run: |
          pip install pytest flake8

      - name: Run tests
        run: |
          pytest -v

      - name: Run linter
        run: |
          flake8 src tests
